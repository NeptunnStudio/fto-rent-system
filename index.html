<!DOCTYPE html>
<html>

<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<title>FTO RENT SYSTEM</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
color:#38bdf8;
}

.card{
background:#1e293b;
padding:20px;
margin:20px 0;
border-radius:10px;
}

input,select{
padding:8px;
margin:5px;
}

button{
background:#38bdf8;
border:none;
padding:10px;
color:black;
cursor:pointer;
}

canvas{
background:white;
}

table{
width:100%;
margin-top:10px;
}

td{
padding:6px;
}

</style>

</head>

<body>

<h1>FTO RENT MANAGEMENT</h1>

<!-- DATABASE AUTO -->

<div class="card">

<h2>Database Auto</h2>

<input id="marca" placeholder="Marca">
<input id="modello" placeholder="Modello">
<input id="targa" placeholder="Targa">
<input id="kmextra" placeholder="Costo km extra">
<input id="penale" placeholder="Penale ritardo">
<input id="deposito" placeholder="Deposito cauzione">

<button onclick="addCar()">Salva Auto</button>

</div>

<!-- CLIENTI -->

<div class="card">

<h2>Clienti</h2>

<input id="cliente_nome" placeholder="Nome Cliente">

<button onclick="addClient()">Salva Cliente</button>

</div>

<!-- NOLEGGIO -->

<div class="card">

<h2>Nuovo Noleggio</h2>

<select id="carSelect"></select>
<select id="clientSelect"></select>

<input id="data_inizio" type="date">
<input id="data_fine" type="date">

<input id="prezzo" placeholder="Prezzo Noleggio">

<button onclick="generateContract()">Genera Contratto PDF</button>

</div>

<!-- FIRMA -->

<div class="card">

<h2>Firma Digitale</h2>

<canvas id="firma" width="400" height="200"></canvas>

<br>

<button onclick="clearSignature()">Cancella</button>

</div>

<!-- STORICO -->

<div class="card">

<h2>Storico Noleggi</h2>

<table id="rentalsTable"></table>

</div>

<!-- DASHBOARD -->

<div class="card">

<h2>Dashboard Guadagni</h2>

<p id="totale"></p>

</div>

<script>

let cars=JSON.parse(localStorage.getItem("cars"))||[]
let clients=JSON.parse(localStorage.getItem("clients"))||[]
let rentals=JSON.parse(localStorage.getItem("rentals"))||[]

function save(){

localStorage.setItem("cars",JSON.stringify(cars))
localStorage.setItem("clients",JSON.stringify(clients))
localStorage.setItem("rentals",JSON.stringify(rentals))

}

function refresh(){

let carSelect=document.getElementById("carSelect")
let clientSelect=document.getElementById("clientSelect")

carSelect.innerHTML=""
clientSelect.innerHTML=""

cars.forEach((c,i)=>{

carSelect.innerHTML+=`<option value="${i}">${c.marca} ${c.modello}</option>`

})

clients.forEach((c,i)=>{

clientSelect.innerHTML+=`<option value="${i}">${c.nome}</option>`

})

updateRentals()

}

function addCar(){

let marca=document.getElementById("marca").value
let modello=document.getElementById("modello").value
let targa=document.getElementById("targa").value
let kmextra=document.getElementById("kmextra").value
let penale=document.getElementById("penale").value
let deposito=document.getElementById("deposito").value

cars.push({marca,modello,targa,kmextra,penale,deposito})

save()
refresh()

}

function addClient(){

let nome=document.getElementById("cliente_nome").value

clients.push({nome,rating:0})

save()
refresh()

}

function createRental(){

let car=document.getElementById("carSelect").value
let client=document.getElementById("clientSelect").value
let inizio=document.getElementById("data_inizio").value
let fine=document.getElementById("data_fine").value
let prezzo=document.getElementById("prezzo").value

rentals.push({car,client,inizio,fine,prezzo})

save()
refresh()

alert("Contratto creato")

}

function updateRentals(){

let table=document.getElementById("rentalsTable")

table.innerHTML=""

let totale=0

rentals.forEach(r=>{

let car=cars[r.car]
let client=clients[r.client]

totale+=Number(r.prezzo)

table.innerHTML+=`

<tr>

<td>${client.nome}</td>
<td>${car.marca} ${car.modello}</td>
<td>${r.inizio}</td>
<td>${r.fine}</td>
<td>€${r.prezzo}</td>

</tr>

`

})

document.getElementById("totale").innerText="Totale guadagni: € "+totale

}

refresh()

/* FIRMA */

let canvas=document.getElementById("firma")
let ctx=canvas.getContext("2d")

let drawing=false

canvas.onmousedown=()=>drawing=true
canvas.onmouseup=()=>drawing=false

canvas.onmousemove=(e)=>{

if(!drawing) return

ctx.lineWidth=2
ctx.lineCap="round"

ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)

}

function clearSignature(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

  async function generateContract(){

let carIndex=document.getElementById("carSelect").value
let clientIndex=document.getElementById("clientSelect").value

let data_inizio=document.getElementById("data_inizio").value
let data_fine=document.getElementById("data_fine").value
let prezzo=document.getElementById("prezzo").value

let car=cars[carIndex]
let client=clients[clientIndex]

const { jsPDF } = window.jspdf

let doc=new jsPDF()

doc.setFontSize(12)

doc.text("CONTRATTO DI NOLEGGIO",20,20)

doc.text("Cliente: "+client.nome,20,40)

doc.text("Auto: "+car.marca+" "+car.modello,20,50)
doc.text("Targa: "+car.targa,20,60)

doc.text("Data inizio: "+data_inizio,20,80)
doc.text("Data fine: "+data_fine,20,90)

doc.text("Prezzo noleggio: €"+prezzo,20,110)

doc.text("Penale ritardo: €"+car.penale+" al giorno",20,130)
doc.text("Costo km extra: €"+car.kmextra+" /km",20,140)

doc.text("Deposito cauzione: €"+car.deposito,20,150)

doc.save("contratto-noleggio.pdf")

}

</script>

</body>

</html>
